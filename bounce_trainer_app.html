<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bounce · Trainer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafaf7; color: #1a1a1a; min-height: 100vh; -webkit-font-smoothing: antialiased; }
.app { max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
.screen { display: none; animation: fadeIn 0.25s ease; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

.header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.logo-dot { width: 10px; height: 10px; background: #d4ff00; border-radius: 50%; border: 2px solid #1a1a1a; }
h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
.sub { font-size: 14px; color: #888; margin-bottom: 1.75rem; }

.trainer-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1rem; }
.trainer-btn { background: #fff; border: 1px solid #ececec; border-radius: 14px; padding: 14px; text-align: left; cursor: pointer; transition: all 0.2s; }
.trainer-btn:hover { border-color: #1a1a1a; transform: translateY(-1px); }
.trainer-btn:active { transform: translateY(0); }
.trainer-name { font-size: 15px; font-weight: 600; }
.trainer-count { font-size: 12px; color: #999; margin-top: 3px; }

.back-btn { background: none; border: none; color: #666; font-size: 14px; cursor: pointer; padding: 6px 0; margin-bottom: 0.75rem; display: inline-flex; align-items: center; gap: 6px; font-weight: 500; }
.back-btn:hover { color: #1a1a1a; }

.dag-select-wrap { margin-bottom: 1rem; }
.dag-select-label { font-size: 12px; color: #888; margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.dag-select { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #ddd; background: #fff; font-size: 15px; color: #1a1a1a; font-weight: 500; cursor: pointer; }
.dag-select:focus { outline: 2px solid #1a1a1a; outline-offset: -1px; }

/* NIEUW: toekomst-waarschuwing */
.toekomst-banner { background: #fffbeb; border: 1px solid #f59e0b; border-radius: 10px; padding: 10px 14px; margin-bottom: 1rem; font-size: 13px; color: #92400e; font-weight: 500; display: none; }
.toekomst-banner.zichtbaar { display: block; }

.week-pill { background: #1a1a1a; color: #fff; border-radius: 8px; padding: 10px 14px; margin-bottom: 1.25rem; font-size: 13px; font-weight: 500; display: flex; justify-content: space-between; align-items: center; }
.week-pill .week-label { color: #d4ff00; font-weight: 600; }

.groep-card { background: #fff; border: 1px solid #ececec; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.groep-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.groep-title { font-size: 15px; font-weight: 700; color: #1a1a1a; }
.groep-time { font-size: 12px; color: #999; margin-top: 2px; font-weight: 500; }
.groep-tag { font-size: 11px; background: #f4f4f1; color: #666; padding: 3px 8px; border-radius: 6px; font-weight: 500; }

.les-toggle { display: flex; gap: 8px; margin-bottom: 12px; }
.les-btn { font-size: 13px; padding: 10px; border-radius: 10px; border: 1px solid #e5e5e5; background: #fafafa; color: #666; cursor: pointer; flex: 1; text-align: center; font-weight: 500; transition: all 0.15s; }
.les-btn.yes { background: #ecfccb; border-color: #65a30d; color: #3f6212; font-weight: 600; }
.les-btn.no { background: #fef2f2; border-color: #dc2626; color: #991b1b; font-weight: 600; }

.field-row { margin-bottom: 12px; }
.field-label { font-size: 11px; color: #999; margin-bottom: 5px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }
.field-label.verplicht { color: #dc2626; }
.field-select, .field-textarea { width: 100%; padding: 9px 12px; border-radius: 9px; border: 1px solid #e5e5e5; background: #fafafa; font-size: 13px; color: #1a1a1a; font-family: inherit; resize: vertical; }
.field-textarea { min-height: 42px; max-height: 100px; }
.field-select:focus, .field-textarea:focus { outline: 2px solid #1a1a1a; outline-offset: -1px; background: #fff; }
.field-textarea.verplicht-border { border-color: #dc2626; background: #fff9f9; }

.divider { height: 1px; background: #f0f0f0; margin: 12px -16px; }
.spelers-wrap { margin-top: 4px; }
.spelers-title { font-size: 11px; color: #999; margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }
.speler-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #f8f8f8; }
.speler-row:last-child { border-bottom: none; }
.speler-row.ontbreekt { background: #fff9f9; border-radius: 8px; padding: 7px 8px; margin: 0 -8px; }
.speler-naam { font-size: 13px; color: #1a1a1a; }
.aanw-toggle { display: flex; gap: 5px; }
.aanw-btn { font-size: 11px; padding: 5px 10px; border-radius: 7px; border: 1px solid #e5e5e5; background: #fafafa; color: #999; cursor: pointer; font-weight: 500; transition: all 0.15s; }
.aanw-btn.aanwezig { background: #ecfccb; border-color: #65a30d; color: #3f6212; font-weight: 600; }
.aanw-btn.afwezig { background: #fef2f2; border-color: #dc2626; color: #991b1b; font-weight: 600; }

/* NIEUW: foutmelding in kaart */
.validatie-fout { font-size: 12px; color: #dc2626; background: #fef2f2; border: 1px solid #fca5a5; border-radius: 8px; padding: 8px 10px; margin-bottom: 10px; display: none; }
.validatie-fout.zichtbaar { display: block; }

.geen-groepen { padding: 2.5rem 1rem; text-align: center; color: #999; font-size: 14px; line-height: 1.6; background: #fff; border: 1px dashed #e5e5e5; border-radius: 14px; }

.submit-wrap { padding: 1rem 0 0.5rem; margin-top: 0.5rem; position: sticky; bottom: 0; background: linear-gradient(to top, #fafaf7 60%, transparent); }
.submit-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #1a1a1a; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.submit-btn:hover { background: #000; transform: translateY(-1px); }
.submit-btn:disabled { background: #ccc; cursor: default; transform: none; }

.confirm-wrap { margin-top: 3rem; text-align: center; }
.confirm-icon { width: 64px; height: 64px; background: #d4ff00; border: 3px solid #1a1a1a; border-radius: 50%; margin: 0 auto 1.25rem; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; color: #1a1a1a; }
.confirm-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.confirm-sub { font-size: 14px; color: #666; line-height: 1.6; max-width: 320px; margin: 0 auto; }
.confirm-new { margin-top: 2rem; background: none; border: 1px solid #1a1a1a; border-radius: 10px; padding: 12px 24px; font-size: 14px; font-weight: 500; cursor: pointer; color: #1a1a1a; transition: all 0.15s; }
.confirm-new:hover { background: #1a1a1a; color: #fff; }

.verv-link { display: block; width: 100%; margin-top: 1rem; background: none; border: 1px dashed #ccc; border-radius: 12px; padding: 13px; font-size: 13px; color: #666; cursor: pointer; text-align: center; font-weight: 500; transition: all 0.2s; }
.verv-link:hover { border-color: #1a1a1a; color: #1a1a1a; }
</style>
</head>
<body>
<div class="app">

  <div id="screen-login" class="screen active">
    <div class="header">
      <div class="logo-dot"></div>
      <h1>Bounce</h1>
    </div>

  <div id="screen-lessen" class="screen">
    <button class="back-btn" onclick="goBack()">← Terug</button>
    <div class="header">
      <div class="logo-dot"></div>
      <h1 id="trainer-naam-display"></h1>

    <div class="toekomst-banner" id="toekomst-banner">

    </div>
    <div class="week-pill" id="week-pill-display"></div>
    <div id="groepen-container"></div>
    <div class="submit-wrap">
      <button class="submit-btn" id="submit-btn" onclick="submitRegistratie()">Registratie versturen</button>
    </div>
  </div>

  <div id="screen-confirm" class="screen">
    <div class="confirm-wrap">
      <div class="confirm-icon">✓</div>
      <p class="confirm-title">Ingevuld!</p>
      <p class="confirm-sub" id="confirm-text"></p>
      <button class="confirm-new" onclick="showScreen('screen-login')">Nieuwe registratie</button>
    </div>
  </div>

</div>

    {id:23, dag:"Donderdag", tijd:"18:00–19:00", trainer:"Luna", spelers:["Céril Cools","Jesper Haerens"]},
    {id:24, dag:"Donderdag", tijd:"19:00–20:00", trainer:"Luna", spelers:["Celeste"]},
    {id:25, dag:"Donderdag", tijd:"20:00–21:00", trainer:"Luna", spelers:["Lambrechts Chiara","Van Cleemput Barbara","Hermans Tine","Amaryllis Audenaert"]},
    {id:26, dag:"Donderdag", tijd:"21:00–22:00", trainer:"Luna", spelers:["Merielle van de Graef","Elyse Smet","Yolissa Heyndrickx"]},
    {id:27, dag:"Vrijdag", tijd:"16:00–17:30", trainer:"Jolien/Laura/Matt/Lucas", spelers:["Staf","Axel","Billie","Juliette","Anouk","Warre","Kasper","Oscar","Josse","Louis","Lev Claessens","Bas Palmaerts","Amber"]},
    {id:28, dag:"Vrijdag", tijd:"17:30–18:30", trainer:"Jebbe", spelers:["Van Hove Oscar","Van Goeye Leon","Vince van Eynde","Tijl Segers"]},
    {id:29, dag:"Vrijdag", tijd:"18:30–19:30", trainer:"Jebbe", spelers:["Florian","Daan","Lou","Dries"]},
    {id:30, dag:"Vrijdag", tijd:"19:30–20:30", trainer:"Jebbe", spelers:["Tim","Lowie","Axance"]},
    {id:32, dag:"Zaterdag", tijd:"10:00–11:00", trainer:"Amir/Thibaud", spelers:["Victor Wasiluk","Julian Smolders","Laura Rennen","Sebastiaan","Emmie"]},
    {id:33, dag:"Zaterdag", tijd:"11:00–12:00", trainer:"Amir", spelers:["Gust","Xander","Quinten","Bram"]},
    {id:34, dag:"Zaterdag", tijd:"11:00–12:00", trainer:"Thibaud", spelers:["Van Nuffelen Gwen","Emma Paelinck"]},
    {id:36, dag:"Zondag", tijd:"11:00–12:00", trainer:"Geert", spelers:["Cindy","Marianne","Ann Blommaert"]},
    {id:37, dag:"Zondag", tijd:"12:00–13:00", trainer:"Geert", spelers:["Hiel Veerle","Monique D'hondt","Stefaan Segers"]},
    {id:38, dag:"Zondag", tijd:"10:00–11:00", trainer:"Jan/Jo", spelers:["Renee Claessens","Juliette Claessens","Elize Vercauteren","Lisette Vercauteren"]}
  ]
};
// ============================================================

const DAG_NR = {Maandag:1,Dinsdag:2,Woensdag:3,Donderdag:4,Vrijdag:5,Zaterdag:6,Zondag:0};
let huidigeTraine = "";
let vervangendTrainer = "";
let registraties = {};

function trainerMatch(trainerVeld, naam) {
  return trainerVeld.split("/").map(s => s.trim()).includes(naam);
}

function datumVoorDag(dagNaam) {
  const target = DAG_NR[dagNaam];
  const d = new Date();
  d.setHours(0,0,0,0);
  const diff = (target - d.getDay() + 7) % 7;
  d.setDate(d.getDate() + diff);
  return d;
}

function isFeestdag(d) {
  return FEESTDAGEN[d.toISOString().slice(0,10)] || false;
}

function formatDatum(d) {
  return d.toLocaleDateString("nl-BE", { weekday: "long", day: "numeric", month: "long" });
}

function getWeekNummer(d) {
  const diff = Math.floor((d - SEIZOEN_START) / (7 * 24 * 60 * 60 * 1000));
  return (diff >= 0 && diff <= 11) ? diff + 1 : null;
}

function getTrainerDagen(trainer) {
  const dagen = [...new Set(DATA.groepen.filter(g => trainerMatch(g.trainer, trainer)).map(g => g.dag))];
  const result = [];
  const vandaag = new Date();
  vandaag.setHours(0,0,0,0);
  const SEIZOEN_EIND = new Date("2026-06-28");

  dagen.forEach(dagNaam => {
    const target = DAG_NR[dagNaam];
    const d = new Date(SEIZOEN_START);
    while (d.getDay() !== target) d.setDate(d.getDate() + 1);
    while (d <= SEIZOEN_EIND) {
      if (!isFeestdag(d)) {
        const isToekomst = d > vandaag;
        const isVandaag = d.getTime() === vandaag.getTime();
        result.push({ dag: dagNaam, datum: new Date(d), isToekomst, isVandaag });
      }
      d.setDate(d.getDate() + 7);
    }
  });
  result.sort((a, b) => a.datum - b.datum);
  return result;
}

function buildTrainerGrid() {
  const grid = document.getElementById("trainer-grid");
  DATA.trainers.forEach(t => {
    const groepen = DATA.groepen.filter(g => trainerMatch(g.trainer, t));
    if (!groepen.length) return;
    const btn = document.createElement("div");
    btn.className = "trainer-btn";
    btn.innerHTML = `<div class="trainer-name">${t}</div><div class="trainer-count">${groepen.length} groep${groepen.length !== 1 ? "en" : ""}</div>`;
    btn.onclick = () => selectTrainer(t);
    grid.appendChild(btn);
  });
}

function selectTrainer(naam) {
  huidigeTraine = naam;
  document.getElementById("trainer-naam-display").textContent = naam;
  const dagSelect = document.getElementById("dag-select");
  dagSelect.innerHTML = "";
  const dagen = getTrainerDagen(naam);

  if (!dagen.length) {
    dagSelect.innerHTML = "<option>Geen trainingen gevonden</option>";
  } else {
    let defaultIndex = 0;
    dagen.forEach((item, i) => {
      const opt = document.createElement("option");
      opt.value = item.dag + "|" + item.datum.toISOString();
      let label = formatDatum(item.datum);
      if (item.isVandaag) { label = "Vandaag · " + label; defaultIndex = i; }
      else if (!item.isToekomst) { label = "↺ " + label; }
      opt.textContent = label;
      dagSelect.appendChild(opt);
    });
    // Als er geen vandaag is, kies eerste toekomstige
    if (!dagen[defaultIndex].isVandaag) {
      const firstFuture = dagen.findIndex(d => d.isToekomst);
      if (firstFuture !== -1) defaultIndex = firstFuture;
    }
    dagSelect.selectedIndex = defaultIndex;
  }

  onDagChange();
  showScreen("screen-lessen");
}

// ============================================================
// WIJZIGING 1: toekomstige datum blokkeren
// ============================================================
function onDagChange() {
  const val = document.getElementById("dag-select").value;
  if (!val || val.indexOf("|") === -1) return;
  const [dag, datumStr] = val.split("|");
  const datum = new Date(datumStr);
  const week = getWeekNummer(datum);
  const pill = document.getElementById("week-pill-display");
  if (week) {
    pill.innerHTML = `<span>${formatDatum(datum)}</span><span class="week-label">WEEK ${week}/10</span>`;
  } else {
    pill.innerHTML = `<span>${formatDatum(datum)}</span><span class="week-label">INHAALWEEK</span>`;
  }

  // Controleer of datum in toekomst ligt of vandaag voor de eerste les
  const nu = new Date();
  const vandaag = new Date();
  vandaag.setHours(0,0,0,0);
  const datumOnly = new Date(datum);
  datumOnly.setHours(0,0,0,0);
  const isToekomst = datumOnly > vandaag;
  const isVandaag = datumOnly.getTime() === vandaag.getTime();

  const banner = document.getElementById("toekomst-banner");
  const submitBtn = document.getElementById("submit-btn");

  let voorEersteLes = false;
  let vroegsteStart = null;
  if (isVandaag) {
    const groepenVandaag = DATA.groepen.filter(g => trainerMatch(g.trainer, huidigeTraine) && g.dag === dag);
    groepenVandaag.forEach(g => {
      if (!g.tijd) return;
      const start = g.tijd.split("–")[0].trim();
      const [u, m] = start.split(":").map(Number);
      if (isNaN(u) || isNaN(m)) return;
      const startDate = new Date(datum);
      startDate.setHours(u, m, 0, 0);
      if (vroegsteStart === null || startDate < vroegsteStart) {
        vroegsteStart = startDate;
      }
    });
    if (vroegsteStart && nu < vroegsteStart) {
      voorEersteLes = true;
    }
  }

  if (isToekomst) {
    banner.textContent = "📅 Deze dag ligt in de toekomst. Registreer pas na de les.";
    banner.classList.add("zichtbaar");
    submitBtn.disabled = true;
    submitBtn.textContent = "Registreer pas na de les";
  } else if (voorEersteLes) {
    const uu = String(vroegsteStart.getHours()).padStart(2, "0");
    const mm = String(vroegsteStart.getMinutes()).padStart(2, "0");
    banner.textContent = `⏰ Je eerste les begint om ${uu}:${mm}. Registreer pas na de les.`;
    banner.classList.add("zichtbaar");
    submitBtn.disabled = true;
    submitBtn.textContent = "Registreer pas na de les";
  } else {
    banner.classList.remove("zichtbaar");
    submitBtn.disabled = false;
    submitBtn.textContent = "Registratie versturen";
  }

  buildGroepenView(dag);
}

function buildGroepenView(dag) {
  const container = document.getElementById("groepen-container");
  container.innerHTML = "";
  registraties = {};
  const groepen = DATA.groepen.filter(g => trainerMatch(g.trainer, huidigeTraine) && g.dag === dag);

  if (!groepen.length) {
    container.innerHTML = `<div class="geen-groepen">Geen groepen voor ${dag}.</div>`;
    return;
  }

  groepen.forEach(g => {
    const defaultGever = vervangendTrainer || huidigeTraine;
    registraties[g.id] = {
      id: g.id,
      dag: g.dag,
      tijd: g.tijd,
      ingepland: g.trainer,
      gever: defaultGever,
      lesGegeven: null,
      opmerking: "",
      aanwezig: {}
    };
    g.spelers.forEach(s => registraties[g.id].aanwezig[s] = null);

    const card = document.createElement("div");
    card.className = "groep-card";

    const isGedeeld = g.trainer.indexOf("/") !== -1;
    const tag = isGedeeld ? `<div class="groep-tag">Gedeeld: ${g.trainer}</div>` : "";

    const vervOpts = DATA.trainers.map(t =>
      `<option value="${t}" ${t === defaultGever ? "selected" : ""}>${t}</option>`
    ).join("");

    card.innerHTML = `
      <div class="groep-header">
        <div>
          <div class="groep-title">Groep ${g.id}</div>
          <div class="groep-time">${g.dag} · ${g.tijd}</div>
        </div>
        ${tag}
      </div>
      <div class="les-toggle">
        <button class="les-btn" id="les-yes-${g.id}" onclick="setLes(${g.id},'yes')">Les gegeven</button>
        <button class="les-btn" id="les-no-${g.id}" onclick="setLes(${g.id},'no')">Geen les</button>
      </div>
      <div class="field-row">
        <div class="field-label">Trainer die lesgaf</div>
        <select class="field-select" id="gever-${g.id}" onchange="setGever(${g.id}, this.value)">${vervOpts}</select>
      </div>
      <div class="field-row" id="opm-row-${g.id}">
        <div class="field-label" id="opm-label-${g.id}">Opmerking (optioneel)</div>
        <textarea class="field-textarea" id="opm-${g.id}" placeholder="Bijv. les gegeven door andere trainer, bijzonderheden..." oninput="setOpmerking(${g.id}, this.value)"></textarea>
      </div>
      <div class="validatie-fout" id="fout-${g.id}"></div>
      <div class="divider"></div>
      <div class="spelers-wrap">
        <div class="spelers-title">Aanwezigheid</div>
        ${g.spelers.map(s => {
          const k = s.replace(/[^a-zA-Z0-9]/g, '_');
          const esc = s.replace(/'/g,"\\'");
          return `<div class="speler-row" id="row-${g.id}-${k}">
            <span class="speler-naam">${s}</span>
            <div class="aanw-toggle">
              <button class="aanw-btn" id="aanw-${g.id}-${k}-ja" onclick="setAanwezig(${g.id},'${esc}','ja')">Aanw.</button>
              <button class="aanw-btn" id="aanw-${g.id}-${k}-nee" onclick="setAanwezig(${g.id},'${esc}','nee')">Afw.</button>
            </div>
          </div>`;
        }).join("")}
      </div>
    `;
    container.appendChild(card);
  });
}

// ============================================================
// WIJZIGING 3: contextueel opmerkingenvak
// ============================================================
function setLes(id, val) {
  registraties[id].lesGegeven = val;
  document.getElementById(`les-yes-${id}`).className = "les-btn" + (val === "yes" ? " yes" : "");
  document.getElementById(`les-no-${id}`).className = "les-btn" + (val === "no" ? " no" : "");

  const label = document.getElementById(`opm-label-${id}`);
  const textarea = document.getElementById(`opm-${id}`);

  if (val === "no") {
    // Geen les: reden is verplicht
    label.textContent = "Reden voor geen les (verplicht)";
    label.className = "field-label verplicht";
    textarea.className = "field-textarea verplicht-border";
    textarea.placeholder = "Bv. regen/wind, veld onbespeelbaar, trainer ziek, feestdag, groep afwezig...";
  } else {
    // Les gegeven: opmerking optioneel
    label.textContent = "Opmerking (optioneel)";
    label.className = "field-label";
    textarea.className = "field-textarea";
    textarea.placeholder = "Bijv. les gegeven door andere trainer, bijzonderheden...";
  }

  // Verberg evt. eerder getoonde foutmelding
  const fout = document.getElementById(`fout-${id}`);
  if (fout) { fout.textContent = ""; fout.classList.remove("zichtbaar"); }
}

function setGever(id, val) { registraties[id].gever = val; }
function setOpmerking(id, val) { registraties[id].opmerking = val; }

function setAanwezig(id, speler, val) {
  registraties[id].aanwezig[speler] = val;
  const k = speler.replace(/[^a-zA-Z0-9]/g, '_');
  document.getElementById(`aanw-${id}-${k}-ja`).className = "aanw-btn" + (val === "ja" ? " aanwezig" : "");
  document.getElementById(`aanw-${id}-${k}-nee`).className = "aanw-btn" + (val === "nee" ? " afwezig" : "");

  // Verwijder highlight als aanwezigheid ingevuld
  const row = document.getElementById(`row-${id}-${k}`);
  if (row) row.classList.remove("ontbreekt");
}

// ============================================================
// WIJZIGING 2: verplichte aanwezigheid + verplichte reden
// ============================================================
async function submitRegistratie() {
  // Validatie
  let fouten = false;

  for (const [id, reg] of Object.entries(registraties)) {
    const foutEl = document.getElementById(`fout-${id}`);
    foutEl.textContent = "";
    foutEl.classList.remove("zichtbaar");

    // Als geen keuze gemaakt: skip (niet blokkeren, alleen waarschuwen bij incomplete)
    if (reg.lesGegeven === null) continue;

    if (reg.lesGegeven === "no") {
      // Reden is verplicht bij "geen les"
      if (!reg.opmerking.trim()) {
        const textarea = document.getElementById(`opm-${id}`);
        textarea.className = "field-textarea verplicht-border";
        foutEl.textContent = "Geef een reden op waarom de les niet doorging.";
        foutEl.classList.add("zichtbaar");
        fouten = true;
      }
    }

    if (reg.lesGegeven === "yes") {
      // Aanwezigheid verplicht voor alle spelers
      const ontbrekend = Object.entries(reg.aanwezig)
        .filter(([, v]) => v === null)
        .map(([s]) => s);

      if (ontbrekend.length > 0) {
        ontbrekend.forEach(s => {
          const k = s.replace(/[^a-zA-Z0-9]/g, '_');
          const row = document.getElementById(`row-${id}-${k}`);
          if (row) row.classList.add("ontbreekt");
        });
        foutEl.textContent = `Vul eerst de aanwezigheid in voor: ${ontbrekend.join(", ")}.`;
        foutEl.classList.add("zichtbaar");
        fouten = true;
      }
    }
  }

  if (fouten) {
    // Scroll naar eerste fout
    const eersteFout = document.querySelector(".validatie-fout.zichtbaar");
    if (eersteFout) eersteFout.scrollIntoView({ behavior: "smooth", block: "center" });
    return;
  }

  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = "Versturen...";

  const val = document.getElementById("dag-select").value;
  const [dag, datumStr] = val.split("|");
  const datum = new Date(datumStr);
  const week = getWeekNummer(datum);

  const payload = {
    trainer: huidigeTraine,
    dag,
    datum: datum.toLocaleDateString("nl-BE", { day: "numeric", month: "long", year: "numeric" }),
    datumISO: datum.toISOString().slice(0,10),
    week: week || "Inhaal",
    groepen: Object.values(registraties)
  };

  try {
    await fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
  } catch(e) {}

  const lessenGegeven = Object.values(registraties).filter(g => g.lesGegeven === "yes").length;
  const naamDisplay = vervangendTrainer ? `${vervangendTrainer} (vervangt ${huidigeTraine})` : huidigeTraine;
  document.getElementById("confirm-text").textContent =
    `${naamDisplay} · ${datum.toLocaleDateString("nl-BE", {day:"numeric",month:"long"})} · ${lessenGegeven} les${lessenGegeven !== 1 ? "sen" : ""} geregistreerd`;

  btn.disabled = false;
  btn.textContent = "Registratie versturen";
  showScreen("screen-confirm");
}

function openVervangingScherm() {
  const jijSel = document.getElementById("verv-jij-select");
  const wieSel = document.getElementById("verv-wie-select");
  const opts = DATA.trainers.map(t => `<option value="${t}">${t}</option>`).join("");
  jijSel.innerHTML = `<option value="">Kies jouw naam...</option>` + opts;
  wieSel.innerHTML = `<option value="">Kies de trainer die je vervangt...</option>` + opts;
  showScreen("screen-vervanging");
}

function bevestigVervanging() {
  const jij = document.getElementById("verv-jij-select").value;
  const wie = document.getElementById("verv-wie-select").value;
  if (!jij) { alert("Kies eerst wie jij bent."); return; }
  if (!wie) { alert("Kies wie je vervangt."); return; }
  if (jij === wie) { alert("Jij en de trainer die je vervangt kunnen niet dezelfde persoon zijn."); return; }

  vervangendTrainer = jij;
  huidigeTraine = wie;

  document.getElementById("trainer-naam-display").textContent = `${jij} (vervangt ${wie})`;
  const dagSelect = document.getElementById("dag-select");
  dagSelect.innerHTML = "";
  const dagen = getTrainerDagen(wie);

  if (!dagen.length) {
    dagSelect.innerHTML = "<option>Geen trainingen gevonden</option>";
  } else {
    let defaultIndex = 0;
    dagen.forEach((item, i) => {
      const opt = document.createElement("option");
      opt.value = item.dag + "|" + item.datum.toISOString();
      let label = formatDatum(item.datum);
      if (item.isVandaag) { label = "Vandaag · " + label; defaultIndex = i; }
      else if (!item.isToekomst) { label = "↺ " + label; }
      opt.textContent = label;
      dagSelect.appendChild(opt);
    });
    if (!dagen[defaultIndex].isVandaag) {
      const firstFuture = dagen.findIndex(d => d.isToekomst);
      if (firstFuture !== -1) defaultIndex = firstFuture;
    }
    dagSelect.selectedIndex = defaultIndex;
  }
  onDagChange();
  showScreen("screen-lessen");
}

function goBack() { vervangendTrainer = ""; showScreen("screen-login"); }
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}

buildTrainerGrid();
</script>
